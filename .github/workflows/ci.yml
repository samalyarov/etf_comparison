name: CI

# Financial decision-making tool: every push and every PR into main must pass lint +
# the full test suite before it can be merged. Keep this gate strict.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Run tests
        # -q quiet, but fail the build on the first sign of trouble. The UI/theme and
        # real-DB data-integrity tests skip automatically when data/etf.db is absent
        # (it is git-ignored), so CI runs the pure code + synthetic-data suites.
        run: pytest -q --maxfail=1
