# Streamlit base theme = Tokyo Night (the default in-app theme).
# The in-app theme toggle reskins backgrounds, cards, and charts at runtime; canvas
# widgets (dataframes) follow this static base, so they look best in Tokyo Night.

[theme]
base = "dark"
primaryColor = "#7aa2f7"              # Tokyo Night blue — accents, active nav, buttons
backgroundColor = "#16161e"           # page plane
secondaryBackgroundColor = "#1a1b26"  # cards, inputs
textColor = "#c0caf5"                 # foreground
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
