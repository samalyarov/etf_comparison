# ETF strategy / exposure profiles — committed, curated knowledge base.
#
# WHY THIS FILE EXISTS
#   data/etf.db (and data/etf_profiles.yaml) are git-ignored and regenerable, so the curated
#   exposure research has to live in a committed seed that survives a DB rebuild — exactly
#   like scripts/candidates.yaml / watchlist.yaml. etf.profiles reads data/etf_profiles.yaml
#   if present, else falls back to THIS seed.
#
# STRUCTURE (DRY: research each index once, funds point at it)
#   indices:  library of index-level exposure profiles, keyed by a short id.
#   funds:    every ISIN in the universe -> which index it tracks (+ per-fund overrides).
#   etf.profiles.get_profile(isin) merges the fund row onto its index profile.
#
# DATA-QUALITY RULE (see CLAUDE.md §4): only numbers actually found on an issuer factsheet /
#   justETF / index-provider factsheet are recorded. Weights that were verified are dated in
#   `as_of` with `source`. Where a breakdown was NOT obtained, the field is omitted/empty and
#   `data_complete: false` — nothing is invented. justETF exposes the top-4 sectors/countries
#   plus an explicit "Other" remainder, so `sector_weights`/`country_weights` sum to ~1.0 by
#   construction with a real "Other" bucket. `region_weights` are a coarse regional
#   aggregation (developed/EM regional splits) and are indicative, not a fund-factsheet field.
#
# SCHEMA per index entry:
#   index_name, strategy, asset_class (equity|bond|commodity|reit|multi),
#   replication (physical|synthetic|null), factor_tilt [list], as_of (date), source,
#   data_complete (bool), region_weights {region: w}, country_weights {country: w},
#   sector_weights {sector: w}   (GICS names; bonds omit — use credit_quality instead),
#   top_holdings [{name, weight}], credit_quality {bucket: w} (bonds), asset_mix (multi).

meta:
