# UCITS ETF watchlist — the ETFs to track and compare.
#
# `ticker` is the Yahoo Finance / exchange ticker used to fetch prices
#   (.DE = Xetra, .L = London, .AS = Amsterdam, .MI = Milan, .SW = SIX).
# `isin` is the stable primary key everything is stored against.
# `ter` (total expense ratio, as a fraction, e.g. 0.0022 = 0.22%) is seeded here
#   from issuer factsheets because API coverage of European fundamentals is patchy.
#
# All entries below are accumulating (ACC) UCITS ETFs — a sensible buy-and-hold core.

etfs:
